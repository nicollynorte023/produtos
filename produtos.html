<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Product List</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background: #f5f6fa;
      font-family: Arial, sans-serif;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      height: 100vh;
      background: #fff;
      border-right: 1px solid #eee;
    }

    .sidebar .nav-link {
      color: #555;
      padding: 10px 15px;
      font-size: 14px;
    }

    .sidebar .nav-link.active {
      color: #0d6efd;
      font-weight: bold;
    }

    /* Topbar */
    .topbar {
      background: #fff;
      padding: 10px 20px;
      border-bottom: 1px solid #eee;
    }

    .search-box {
      background: #f1f3f6;
      border-radius: 20px;
      padding: 5px 15px;
      border: none;
      width: 250px;
    }

    /* Cards */
    .product-card {
      border: none;
      border-radius: 12px;
      overflow: hidden;
      transition: 0.2s;
      background: #fff;
    }

    .product-card:hover {
      transform: translateY(-5px);
    }

    .price {
      font-weight: bold;
    }

    .old-price {
      text-decoration: line-through;
      color: #aaa;
      margin-left: 5px;
    }

    .discount {
      color: green;
      font-size: 13px;
      margin-left: 5px;
    }

    .rating {
      color: #f39c12;
      font-size: 14px;
    }

    .btn-cart {
      background: #28a745;
      color: #fff;
      border-radius: 6px;
      font-size: 14px;
    }

    .btn-cart:hover {
      background: #218838;
    }

  </style>
</head>

<body>

<div class="d-flex">

  <!-- Sidebar -->
  <div class="sidebar p-3">
    <h5 class="mb-4">Menu</h5>

    <nav class="nav flex-column">
      <a class="nav-link" href="menu.html"> Dashboard</a>
      <a class="nav-link" active href="produtos.html">Product</a>
      <a class="nav-link " href="adicionar.html">Add Products</a>
    </nav>
  </div>
<div class="main">

    <!-- HEADER -->
    <div class="topbar">
        <div>
            <h5>Home > Product </h5>
        </div>

        <input type="text" class="form-control search-box" placeholder="Search anything">
    </div>
  <!-- Conteúdo -->
  <div class="flex-grow-1">


    <!-- Conteúdo principal -->
    <div class="p-4">

      <div class="d-flex justify-content-between mb-3">
        <h4>Product List</h4>
        <button class="btn btn-secondary">2 View Cart</button>
      </div>

      <div class="row g-4">

        <!-- Produto 1 -->
        <div class="col-md-3">
          <div class="card product-card">
            <img src="https://picsum.photos/300/200?1">
            <div class="card-body">
              <h6>Green Salad</h6>
              <p class="price">
                $20 <span class="old-price">$24</span>
                <span class="discount">50% Off</span>
              </p>
              <p class="rating">⭐⭐⭐⭐⭐ (1050)</p>
              <button class="btn btn-cart w-100">Add to Cart</button>
            </div>
          </div>
        </div>

        <!-- Produto 2 -->
        <div class="col-md-3">
          <div class="card product-card">
            <img src="https://picsum.photos/300/200?2">
            <div class="card-body">
              <h6>Nicoise Salad</h6>
              <p class="price">
                $19 <span class="old-price">$27</span>
                <span class="discount">30% Off</span>
              </p>
              <p class="rating">⭐⭐⭐⭐ (2750)</p>
              <button class="btn btn-cart w-100">Add to Cart</button>
            </div>
          </div>
        </div>

        <!-- Produto 3 -->
        <div class="col-md-3">
          <div class="card product-card">
            <img src="https://picsum.photos/300/200?3">
            <div class="card-body">
              <h6>Augustin Salad</h6>
              <p class="price">
                $18 <span class="old-price">$22</span>
                <span class="discount">27% Off</span>
              </p>
              <p class="rating">⭐⭐⭐⭐⭐ (3629)</p>
              <button class="btn btn-cart w-100">Add to Cart</button>
            </div>
          </div>
        </div>

        <!-- Produto 4 -->
        <div class="col-md-3">
          <div class="card product-card">
            <img src="https://picsum.photos/300/200?4">
            <div class="card-body">
              <h6>Bagatelle Salad</h6>
              <p class="price">
                $15 <span class="old-price">$20</span>
                <span class="discount">10% Off</span>
              </p>
              <p class="rating">⭐⭐⭐⭐⭐ (5329)</p>
              <button class="btn btn-cart w-100">Add to Cart</button>
            </div>
          </div>
        </div>

      </div>

    </div>

  </div>

</div>

</body>
</html>
